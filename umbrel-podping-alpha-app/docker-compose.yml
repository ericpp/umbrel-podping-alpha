version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: umbrel-podping-alpha-app_web_1
      APP_PORT: 8089

  web:
    image: ericpp/gossip-listener@sha256:a5e6d0b25c1b4cf689d3c5d0d533b18bb9e525fe86e77b6b28d1dd25fd8bb9fc
    entrypoint: ["/data/init.sh"]
    init: true
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
